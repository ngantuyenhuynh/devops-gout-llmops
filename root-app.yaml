# kubectl apply -f root-app.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ngantuyenhuynh/devops-gout-llmops.git'
    targetRevision: main
    path: k8s/argocd-apps # Thư mục chứa các định nghĩa Application ở Bước 2
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
