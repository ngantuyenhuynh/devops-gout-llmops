apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: eval-orchestrator-monitor
  namespace: gout-eval
  labels:
    # Label này để Prometheus tự động nhận diện (khớp với helm values)
    release: monitoring-stack 
spec:
  selector:
    matchLabels:
      app: eval-orchestrator
  namespaceSelector:
    matchNames:
      - gout-eval
  endpoints:
  - port: http # Khớp với tên port nếu có định nghĩa trong service
    path: /metrics
    interval: 60s 
    
    sampleLimit: 1000 
    
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: '^python_gc_.*'
        action: drop
        
      - regex: '^client_ip|user_agent$'
        action: labeldrop
