apiVersion: batch/v1
kind: Job
metadata:
  name: gout-ingestion-job
  namespace: gout-eval
spec:
  template:
    spec:
      containers:
      - name: ingestion-container
        # Nhớ thay YOUR_PROJECT_ID bằng nt549-project
        image: asia-southeast1-docker.pkg.dev/nt549-project/gout-llmops-repo/data-ingestion:latest
        imagePullPolicy: Always
      restartPolicy: OnFailure
  # Tự động xóa Job sau khi chạy xong 100 giây để sạch cụm K8s
  ttlSecondsAfterFinished: 100
