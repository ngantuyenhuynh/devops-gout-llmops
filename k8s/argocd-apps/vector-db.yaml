apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vector-db-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ngantuyenhuynh/devops-gout-llmops.git'
    targetRevision: main
    path: k8s/vector-db
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gout-eval
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
