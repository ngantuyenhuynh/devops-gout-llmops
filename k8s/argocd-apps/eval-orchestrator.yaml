apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eval-orchestrator-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ngantuyenhuynh/devops-gout-llmops.git'
    targetRevision: main
    path: k8s/eval-orchestrator
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gout-eval # Namespace ứng dụng sẽ chạy
  syncPolicy:
    automated:
      prune: true # Tự động xóa tài nguyên nếu bị xóa trên Git
      selfHeal: true # Tự động sửa lỗi nếu có ai sửa tay trên cụm K8s
    syncOptions:
      - CreateNamespace=true
