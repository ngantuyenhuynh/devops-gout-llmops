apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ui-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ngantuyenhuynh/devops-gout-llmops.git'
    targetRevision: main
    path: k8s/ui
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gout-eval
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
