apiVersion: batch/v1
kind: Job
metadata:
  name: evaluation-job
  namespace: gout-eval
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: evaluation-job
        image: asia-southeast1-docker.pkg.dev/nt549-project/gout-llmops-repo/evaluation-job:latest
        imagePullPolicy: Always
        env:
        - name: ORCHESTRATOR_URL
          value: http://eval-orchestrator-service.gout-eval.svc.cluster.local:8000/ask
        - name: TESTSET_PATH
          value: /app/data/gout_test_cases.json
        - name: REQUEST_TIMEOUT
          value: "None"
        - name: JUDGE_MODEL
          value: gpt-4o-mini
        - name: EVAL_MODEL_NAME
          value: qwen2:1.5b
        - name: QUALITY_GATE_FAITHFULNESS_MIN
          value: "0.40"
        - name: QUALITY_GATE_COMPLETENESS_MIN
          value: "1.0"
        - name: QUALITY_GATE_RAGAS_FAITHFULNESS_MIN
          value: "0.30"
        - name: QUALITY_GATE_RAGAS_RELEVANCE_MIN
          value: "0.30"
        - name: QUALITY_GATE_RAGAS_CONTEXT_RECALL_MIN
          value: "0.60"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: OPENAI_API_KEY
