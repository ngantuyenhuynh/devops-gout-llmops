name: Full RAG Evaluation (Manual)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Tự động chạy vào 12h đêm hàng ngày

env:
  PROJECT_ID: logical-carver-490713-d8
  REGION: asia-southeast1
  GKE_CLUSTER: cluster-1
  GKE_LOCATION: asia-southeast1-a
  K8S_NAMESPACE: gout-eval

concurrency:
  group: gout-eval-namespace-lock
  cancel-in-progress: false
  
jobs:
  comprehensive-evaluation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_LOCATION }}

    - name: Run Full Evaluation Job
      run: |
        sed -i 's/gout_test_cases_mini.json/gout_test_cases.json/g' k8s/evaluation-job/job.yaml
        
        kubectl delete job evaluation-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
        kubectl apply -f k8s/evaluation-job/job.yaml
        
        echo "Đang chờ đánh giá toàn diện..."
        # Tăng timeout lên 10800s (3 tiếng) cho tập dữ liệu lớn
        if ! kubectl wait --for=condition=complete job/evaluation-job -n ${{ env.K8S_NAMESPACE }} --timeout=10800s; then
          kubectl logs job/evaluation-job -n ${{ env.K8S_NAMESPACE }} || true
          exit 1
        fi
