name: Full RAG Evaluation

on:
  push:
    branches: ["main"]
  schedule:
    # Run nightly at 01:00 UTC for continuous evaluation.
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: gout-eval-namespace-lock
  cancel-in-progress: false

env:
  REGION: ${{ vars.GCP_REGION }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
  GKE_LOCATION: ${{ vars.GKE_LOCATION }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
  EVALUATION_JOB_NAME: evaluation-job
  FULL_TESTSET_PATH: /app/data/gout_test_cases.json
  EVAL_TIMEOUT_SECONDS: "18000"
  POLL_INTERVAL_SECONDS: "120"

jobs:
  full-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          missing=""
          for var_name in REGION GKE_CLUSTER GKE_LOCATION K8S_NAMESPACE; do
            if [ -z "${!var_name}" ]; then
              missing="$missing $var_name"
            fi
          done
          if [ -z "${{ secrets.GCP_CREDENTIALS }}" ]; then
            missing="$missing GCP_CREDENTIALS(secret)"
          fi
          if [ -n "$missing" ]; then
            echo "Missing required GitHub Variables/Secrets:$missing"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      - name: Run Full Evaluation Job
        run: |
          TMP_JOB_FILE="$(mktemp)"
          cp k8s/evaluation-job/job.yaml "$TMP_JOB_FILE"
          sed -i "s|gout_test_cases_mini.json|$(basename "$FULL_TESTSET_PATH")|g" "$TMP_JOB_FILE"

          kubectl delete job "$EVALUATION_JOB_NAME" -n "$K8S_NAMESPACE" --ignore-not-found=true
          kubectl apply -f "$TMP_JOB_FILE"

          echo "Waiting for full evaluation to complete (up to $((EVAL_TIMEOUT_SECONDS/3600)) hours)..."

          elapsed=0
          while [ "$elapsed" -lt "$EVAL_TIMEOUT_SECONDS" ]; do
            status=$(kubectl get job "$EVALUATION_JOB_NAME" -n "$K8S_NAMESPACE" -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || echo "Unknown")
            failed=$(kubectl get job "$EVALUATION_JOB_NAME" -n "$K8S_NAMESPACE" -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "Unknown")

            if [ "$status" = "True" ]; then
              echo "Full evaluation completed successfully."
              exit 0
            fi

            if [ "$failed" = "True" ]; then
              echo "Full evaluation job failed. Printing logs..."
              kubectl logs job/"$EVALUATION_JOB_NAME" -n "$K8S_NAMESPACE" || true
              exit 1
            fi

            echo "Still running... elapsed $((elapsed/60)) minutes"
            sleep "$POLL_INTERVAL_SECONDS"
            elapsed=$((elapsed + POLL_INTERVAL_SECONDS))
          done

          echo "Timed out after $EVAL_TIMEOUT_SECONDS seconds."
          kubectl logs job/"$EVALUATION_JOB_NAME" -n "$K8S_NAMESPACE" || true
          exit 1
