name: Build, Scan and Push Microservices to GCP

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'src/eval-orchestrator/**'
      - 'src/data-ingestion/**'
      - 'src/evaluation-job/**'
      - 'k8s/**'
      - 'data/**'
      - 'src/ui/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPO_NAME: ${{ vars.REPO_NAME }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
  GKE_LOCATION: ${{ vars.GKE_LOCATION }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}

concurrency:
  group: gout-eval-namespace-lock
  cancel-in-progress: false
  
jobs:
  build-push-and-evaluate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # === BƯỚC 1: QUÉT BẢO MẬT MÃ NGUỒN (FS SCAN) ===
    - name: Run Trivy vulnerability scanner (Repo Scan)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'table'
        exit-code: '0' 
        severity: 'CRITICAL,HIGH'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Login to Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGION }}-docker.pkg.dev
        username: _json_key
        password: ${{ secrets.GCP_CREDENTIALS }}

    # === BƯỚC 2: BUILD VÀ QUÉT IMAGE (EVAL-ORCHESTRATOR) ===
    - name: Build Eval-Orchestrator Local
      uses: docker/build-push-action@v5
      with:
        context: ./src/eval-orchestrator
        load: true
        tags: eval-orchestrator:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan Eval-Orchestrator Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'eval-orchestrator:test'
        format: 'table'
        exit-code: '0' 
        severity: 'CRITICAL,HIGH'

    - name: Push Eval-Orchestrator to Registry
      run: |
        IMAGE_PATH=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/eval-orchestrator
        docker tag eval-orchestrator:test $IMAGE_PATH:${{ github.sha }}
        docker push $IMAGE_PATH:${{ github.sha }}
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          docker tag eval-orchestrator:test $IMAGE_PATH:latest
          docker push $IMAGE_PATH:latest
        fi

    # === BƯỚC 3: BUILD VÀ QUÉT IMAGE (DATA-INGESTION) ===
    - name: Build Ingestion Local
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/data-ingestion/Dockerfile
        load: true
        tags: data-ingestion:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan Ingestion Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'data-ingestion:test'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL'

    - name: Push Ingestion Image
      run: |
        IMAGE_PATH=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/data-ingestion
        docker tag data-ingestion:test $IMAGE_PATH:${{ github.sha }}
        docker push $IMAGE_PATH:${{ github.sha }}
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          docker tag data-ingestion:test $IMAGE_PATH:latest
          docker push $IMAGE_PATH:latest
        fi
        
    # === BƯỚC 3.5: BUILD VÀ PUSH IMAGE (EVALUATION-JOB) ===
    - name: Build Evaluation Job Local
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/evaluation-job/Dockerfile
        load: true
        tags: evaluation-job:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Push Evaluation Job Image
      run: |
        IMAGE_PATH=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/evaluation-job
        docker tag evaluation-job:test $IMAGE_PATH:${{ github.sha }}
        docker push $IMAGE_PATH:${{ github.sha }}
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          docker tag evaluation-job:test $IMAGE_PATH:latest
          docker push $IMAGE_PATH:latest
        fi
        
    # === BƯỚC 3.8: BUILD VÀ PUSH IMAGE (STREAMLIT UI) ===
    - name: Build Streamlit UI Local
      uses: docker/build-push-action@v5
      with:
        context: ./src/ui
        file: ./src/ui/Dockerfile
        load: true
        tags: gout-ui:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan Streamlit UI Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'gout-ui:test'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Push Streamlit UI Image
      run: |
        IMAGE_PATH=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/gout-ui
        docker tag gout-ui:test $IMAGE_PATH:${{ github.sha }}
        docker push $IMAGE_PATH:${{ github.sha }}
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          docker tag gout-ui:test $IMAGE_PATH:latest
          docker push $IMAGE_PATH:latest
        fi

    # === BƯỚC 4: TRIỂN KHAI VÀ EVALUATE (CHỈ DÀNH CHO MAIN) ===
    - name: Get GKE credentials
      if: github.ref == 'refs/heads/main'
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_LOCATION }}

    # 🚀 FIX LỖI Ở ĐÂY: Dời việc tính toán Testset lên TRƯỚC khi Deploy
    - name: Detect Evaluation Testset
      if: github.ref == 'refs/heads/main'
      id: eval_testset
      run: |
        CHANGED_TESTSET=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -E '^data/gout_test_cases(_mini)?\.json(l)?$' | head -n 1 || true)
        if [ -n "$CHANGED_TESTSET" ]; then
          TESTSET_PATH="/app/${CHANGED_TESTSET}"
          echo "Phát hiện testset thay đổi: $CHANGED_TESTSET"
        else
          TESTSET_PATH="/app/data/gout_test_cases_mini.json"
          echo "Không có testset mới thay đổi, dùng mặc định: $TESTSET_PATH"
        fi
        echo "testset_path=$TESTSET_PATH" >> "$GITHUB_OUTPUT"

    # 🚀 FIX LỖI Ở ĐÂY: Ép K8s dùng Image SHA và đồng bộ Data
    - name: Inject SHA Tags & Sync Data ConfigMap
      if: github.ref == 'refs/heads/main'
      run: |
        echo "1. Ép file cấu hình dùng Image chứa mã SHA mới nhất (Chống cache)..."
        find k8s/ -type f -name "*.yaml" -exec sed -i "s|\(image: .*/eval-orchestrator\):latest|\1:${{ github.sha }}|g" {} +
        find k8s/ -type f -name "*.yaml" -exec sed -i "s|\(image: .*/data-ingestion\):latest|\1:${{ github.sha }}|g" {} +
        find k8s/ -type f -name "*.yaml" -exec sed -i "s|\(image: .*/evaluation-job\):latest|\1:${{ github.sha }}|g" {} +
        find k8s/ -type f -name "*.yaml" -exec sed -i "s|\(image: .*/gout-ui\):latest|\1:${{ github.sha }}|g" {} +
        
        echo "2. Đồng bộ file JSON lên K8s (Tránh quá tải size 256KB)..."
        kubectl create configmap gout-data-config --from-file=data/gout_test_cases.json --namespace=${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl replace --force -f -
    
    - name: Apply manifests
      if: github.ref == 'refs/heads/main'
      run: |
        kubectl apply -f k8s/vector-db/qdrant.yaml
        kubectl apply -f k8s/inference-worker/ollama.yaml 
        kubectl apply -f k8s/eval-orchestrator/deployment.yaml
        kubectl apply -f k8s/eval-orchestrator/service.yaml
        kubectl apply -f k8s/eval-orchestrator/service-monitor.yaml
        kubectl apply -f k8s/ui-deployment.yaml

        kubectl delete job gout-ingestion-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
        kubectl apply -f k8s/data-ingestion/job.yaml

    - name: Upsert OpenAI secret
      if: github.ref == 'refs/heads/main'
      run: |
        kubectl create secret generic openai-secret \
          --from-literal=api-key='${{ secrets.OPENAI_API_KEY }}' \
          --namespace=${{ env.K8S_NAMESPACE }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Upsert SMTP secret
      if: github.ref == 'refs/heads/main'
      run: |
        kubectl create secret generic smtp-secret \
          --from-literal=username='${{ secrets.SMTP_AUTH_USERNAME }}' \
          --from-literal=password='${{ secrets.SMTP_AUTH_PASSWORD }}' \
          --namespace=monitoring \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Wait for eval-orchestrator rollout
      if: github.ref == 'refs/heads/main'
      run: kubectl rollout status deployment/eval-orchestrator -n ${{ env.K8S_NAMESPACE }} --timeout=300s

    - name: Extract Evaluation Config
      if: github.ref == 'refs/heads/main'
      id: eval_config
      run: |
        MODEL_NAME=$(awk '/name: EVAL_MODEL_NAME/{getline; sub(/^[[:space:]]*value:[[:space:]]*/, "", $0); print; exit}' k8s/evaluation-job/job.yaml)
        if [ -z "$MODEL_NAME" ]; then
          echo "Không tìm thấy EVAL_MODEL_NAME trong k8s/evaluation-job/job.yaml"
          exit 1
        fi
        echo "model_name=$MODEL_NAME" >> "$GITHUB_OUTPUT"
        echo "Đánh giá model: $MODEL_NAME"

    - name: Wait for Ollama rollout
      if: github.ref == 'refs/heads/main'
      run: kubectl rollout status deployment/ollama-worker -n ${{ env.K8S_NAMESPACE }} --timeout=600s

    - name: Pull Evaluation Model in Ollama
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Đang tải model ${{ steps.eval_config.outputs.model_name }} vào Ollama..."
        kubectl exec -n ${{ env.K8S_NAMESPACE }} deployment/ollama-worker -- ollama pull "${{ steps.eval_config.outputs.model_name }}"

    - name: Run Smoke Test (Mini Eval)
      if: github.ref == 'refs/heads/main'
      run: |
        kubectl delete job evaluation-job -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
        
        echo "⏳ Đang đợi 2 phút để Orchestrator nạp xong Model HuggingFace..."
        sleep 120
        
        kubectl apply -f k8s/evaluation-job/job.yaml
        
        if ! kubectl wait --for=condition=complete job/evaluation-job -n ${{ env.K8S_NAMESPACE }} --timeout=1800s; then
          echo "Smoke test thất bại cho model ${{ steps.eval_config.outputs.model_name }}!"
          kubectl logs job/evaluation-job -n ${{ env.K8S_NAMESPACE }} || true
          exit 1
        fi
        echo "Smoke test thành công!"
        kubectl logs job/evaluation-job -n ${{ env.K8S_NAMESPACE }} || true
